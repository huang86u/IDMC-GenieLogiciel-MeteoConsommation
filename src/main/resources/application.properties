spring.application.name=GenieLogicielMeteoConsommation

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:meteo_consommation;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:200MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:200MB}
