<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Importation Météo - Grand Est</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .container { padding: 20px; border: 1px solid #ccc; border-radius: 5px; width: 400px; }
        input, button { margin-top: 10px; padding: 5px; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <h2>Importer les données Météo</h2>
    <form action="http://localhost:8080/api/donnees/importer-meteo" method="POST" enctype="multipart/form-data">

        <label for="files">Sélectionnez vos fichiers CSV Météo (Vous pouvez en sélectionner plusieurs d'un coup) :</label>
        <input type="file" id="files" name="files" accept=".csv" multiple required>

        <button type="submit">Lancer l'importation multiple</button>
    </form>
</div>
</body>
</html>
